name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-test:
    name: ${{ matrix.name }} (${{ matrix.build_type }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux GCC
            os: ubuntu-latest
            c_compiler: gcc
            cxx_compiler: g++
            build_type: Debug
          - name: Linux GCC
            os: ubuntu-latest
            c_compiler: gcc
            cxx_compiler: g++
            build_type: Release
          - name: Linux Clang
            os: ubuntu-latest
            c_compiler: clang
            cxx_compiler: clang++
            build_type: Debug
          - name: Linux Clang
            os: ubuntu-latest
            c_compiler: clang
            cxx_compiler: clang++
            build_type: Release
          - name: macOS Clang
            os: macos-latest
            c_compiler: clang
            cxx_compiler: clang++
            build_type: Debug
          - name: macOS Clang
            os: macos-latest
            c_compiler: clang
            cxx_compiler: clang++
            build_type: Release
          - name: Windows MSVC
            os: windows-latest
            c_compiler: cl
            cxx_compiler: cl
            build_type: Debug
          - name: Windows MSVC
            os: windows-latest
            c_compiler: cl
            cxx_compiler: cl
            build_type: Release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Show tool versions
        run: |
          cmake --version
          ninja --version
          ctest --version

      - name: Configure (Unix-like)
        if: runner.os != 'Windows'
        env:
          CC: ${{ matrix.c_compiler }}
          CXX: ${{ matrix.cxx_compiler }}
        run: >-
          cmake
          -S .
          -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCPF_BUILD_BENCHMARKS=OFF

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: >-
          cmake
          -S .
          -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCPF_BUILD_BENCHMARKS=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build -V -C ${{ matrix.build_type }}
